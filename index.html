<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulación de Círculos</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="./assets/css/styles.css">
    <link rel="shortcut icon" href="./assets/img/icon.png" type="image/x-icon">
</head>
<body>

<!-- 🔥 NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">Simulación de Círculos</span>
    </div>
</nav>

<div class="container mt-4">

    <!-- 🔥 SELECTOR -->
    <div class="row mb-4">
        <div class="col text-center">
            <label class="form-label">Cantidad de círculos:</label>
            <input type="range" id="slider" min="2" max="15" value="6" class="form-range">
            <h5 id="valor">6</h5>
        </div>
    </div>

    <!-- 🔥 CANVAS -->
    <div class="row text-center">
        <div class="col-md-4">
            <h5>Movimiento</h5>
            <canvas id="canvas1"></canvas>
        </div>

        <div class="col-md-4">
            <h5>Colisión</h5>
            <canvas id="canvas2"></canvas>
        </div>

        <div class="col-md-4">
            <h5>Rebote</h5>
            <canvas id="canvas3"></canvas>
        </div>
    </div>

</div>

<!-- 🔥 FOOTER -->
<footer class="bg-dark text-white text-center mt-4 p-3">
    <p>Desarrollado por: Eduardo Nava</p>
</footer>

<!-- JS -->
<script src="./assets/js/main.js"></script>
<script src="./assets/js/main_colision.js"></script>
<script src="./assets/js/main_rebote.js"></script>

<script>
const slider = document.getElementById("slider");
const valor = document.getElementById("valor");

slider.addEventListener("input", () => {
    valor.textContent = slider.value;

    // 🔥 recargar animaciones
    initMovimiento(slider.value);
    initColision(slider.value);
    initRebote(slider.value);
});

// inicial
initMovimiento(slider.value);
initColision(slider.value);
initRebote(slider.value);
</script>

</body>
</html>
