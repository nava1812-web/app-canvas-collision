<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulación de Círculos</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="./assets/css/styles.css">
    <link rel="shortcut icon" href="/assets/img/icon.png" type="image/x-icon">
</head>
<body>

<!-- 🔥 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-gradient shadow">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">⚡ Simulación de Círculos</span>
        <span class="text-white" id="fecha"></span>
    </div>
</nav>

<div class="container mt-4">

    <!-- 🔥 PANEL CONTROL -->
    <div class="card shadow-lg p-4 mb-4 text-center">
        <h5 class="mb-3">Cantidad de círculos</h5>
        <input type="range" id="slider" min="2" max="15" value="6" class="form-range">
        <h3 id="valor" class="fw-bold text-primary">6</h3>
    </div>

    <!-- 🔥 CANVAS -->
    <div class="row g-4">

        <div class="col-md-4">
            <div class="card canvas-card shadow">
                <div class="card-header text-center fw-bold text-primary">
                    🔵 Movimiento
                </div>
                <div class="card-body text-center">
                    <canvas id="canvas1"></canvas>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card canvas-card shadow">
                <div class="card-header text-center fw-bold text-danger">
                    🔴 Colisión
                </div>
                <div class="card-body text-center">
                    <canvas id="canvas2"></canvas>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card canvas-card shadow">
                <div class="card-header text-center fw-bold text-success">
                    🟢 Rebote
                </div>
                <div class="card-body text-center">
                    <canvas id="canvas3"></canvas>
                </div>
            </div>
        </div>

    </div>

</div>

<!-- 🔥 FOOTER -->
<footer class="footer mt-5">
    <div class="container text-center">
        <p class="mb-1">Desarrollado por: <strong>Eduardo Nava</strong></p>
        <small id="fechaFooter"></small>
    </div>
</footer>

<!-- JS -->
<script src="./assets/js/main.js"></script>
<script src="./assets/js/main_colision.js"></script>
<script src="./assets/js/main_rebote.js"></script>

<script>
// slider
const slider = document.getElementById("slider");
const valor = document.getElementById("valor");

slider.addEventListener("input", () => {
    valor.textContent = slider.value;
    initMovimiento(slider.value);
    initColision(slider.value);
    initRebote(slider.value);
});

// fecha actual
function obtenerFecha() {
    const hoy = new Date();
    return hoy.toLocaleDateString("es-MX", {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric"
    });
}

document.getElementById("fecha").textContent = obtenerFecha();
document.getElementById("fechaFooter").textContent = obtenerFecha();

// inicial
initMovimiento(slider.value);
initColision(slider.value);
initRebote(slider.value);
</script>

</body>
</html>
